name: Slishu
options:
  bundleIdPrefix: com.slishu
  developmentLanguage: ru
  deploymentTarget:
    macOS: "15.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "15.0"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  FlyingFox:
    url: https://github.com/swhitty/FlyingFox
    from: "0.26.0"
  MCP:
    url: https://github.com/modelcontextprotocol/swift-sdk
    exactVersion: "0.12.1"
  SlishuVec:
    path: Packages/SlishuVec

targets:
  Slishu:
    type: application
    platform: macOS
    sources:
      - path: SlishuApp
    dependencies:
      - package: GRDB
        product: GRDB
      - package: FlyingFox
        product: FlyingFox
      - package: MCP
        product: MCP
      - package: SlishuVec
        product: CSqliteVec
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.slishu.app
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: SlishuApp/Slishu.entitlements
        CODE_SIGN_IDENTITY: "-"
        # Hardened Runtime БЕЗ App Sandbox — добавится при упаковке (1d). Для dev — ad-hoc.
        INFOPLIST_KEY_NSScreenCaptureUsageDescription: "Slishu читает экран, чтобы вести историю вашей активности и таймлайн. Всё остаётся на устройстве."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Slishu записывает и транскрибирует аудио локально, для поиска по разговорам."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Slishu распознаёт речь на устройстве для поиска по аудио."
        INFOPLIST_KEY_LSUIElement: "NO"
        INFOPLIST_KEY_LSMinimumSystemVersion: "15.0"
