name: ZBSEye                 # internal codename of the target/scheme. Product brand — "ZBS Eye" (display name + bundle id below)
options:
  bundleIdPrefix: gg.zbs
  developmentLanguage: en
  deploymentTarget:
    macOS: "15.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_EMIT_LOC_STRINGS: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  FlyingFox:
    url: https://github.com/swhitty/FlyingFox
    from: "0.26.0"
  MCP:
    url: https://github.com/modelcontextprotocol/swift-sdk
    exactVersion: "0.12.1"
  ZBSEyeVec:
    path: Packages/ZBSEyeVec
  Embeddings:
    url: https://github.com/jkrukowski/swift-embeddings
    from: "0.0.16"

targets:
  ZBSEye:
    type: application
    platform: macOS
    sources:
      - path: ZBSEyeApp
    dependencies:
      - package: GRDB
        product: GRDB
      - package: FlyingFox
        product: FlyingFox
      - package: MCP
        product: MCP
      - package: ZBSEyeVec
        product: CSqliteVec
      - package: Embeddings
        product: Embeddings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: gg.zbs.eye
        PRODUCT_NAME: "ZBS Eye"          # bundle = "ZBS Eye.app" (target/scheme — ZBSEye, no space)
        INFOPLIST_KEY_CFBundleDisplayName: "ZBS Eye"
        INFOPLIST_KEY_CFBundleName: "ZBS Eye"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: ZBSEyeApp/ZBSEye.entitlements
        # Default — ad-hoc. A stable self-signed identity "ZBS Eye Dev" (internal cert name; without
        # a $99 account): scripts/make-signing-cert.sh once, then build with CODE_SIGN_IDENTITY="ZBS Eye Dev"
        # (scripts/build-release.sh does this itself). A stable signature = TCC permissions and Keychain ACL
        # survive rebuilds. Developer ID/notarization — when a paid account appears.
        CODE_SIGN_IDENTITY: "-"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSScreenCaptureUsageDescription: "ZBS Eye reads the screen for your activity history and timeline, and (if enabled in settings) records system audio — calls, meetings, videos — to make conversations searchable. Everything stays on your device."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "ZBS Eye records and transcribes audio locally, to make conversations searchable."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "ZBS Eye recognizes speech on-device to make audio searchable."
        INFOPLIST_KEY_LSUIElement: "NO"
        INFOPLIST_KEY_LSMinimumSystemVersion: "15.0"
