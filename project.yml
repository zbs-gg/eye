name: Slishu
options:
  bundleIdPrefix: com.slishu
  developmentLanguage: ru
  deploymentTarget:
    macOS: "15.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "15.0"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  FlyingFox:
    url: https://github.com/swhitty/FlyingFox
    from: "0.26.0"
  MCP:
    url: https://github.com/modelcontextprotocol/swift-sdk
    exactVersion: "0.12.1"
  SlishuVec:
    path: Packages/SlishuVec
  Embeddings:
    url: https://github.com/jkrukowski/swift-embeddings
    from: "0.0.16"

targets:
  Slishu:
    type: application
    platform: macOS
    sources:
      - path: SlishuApp
    dependencies:
      - package: GRDB
        product: GRDB
      - package: FlyingFox
        product: FlyingFox
      - package: MCP
        product: MCP
      - package: SlishuVec
        product: CSqliteVec
      - package: Embeddings
        product: Embeddings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.slishu.app
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: SlishuApp/Slishu.entitlements
        # Дефолт — ad-hoc. Стабильная self-signed идентичность «Slishu Dev» (без $99-аккаунта):
        # scripts/make-signing-cert.sh один раз, затем сборка с CODE_SIGN_IDENTITY="Slishu Dev"
        # (scripts/build-release.sh делает это сам). Стабильная подпись = TCC-права и Keychain ACL
        # переживают ребилды. Developer ID/нотаризация — когда появится платный аккаунт.
        CODE_SIGN_IDENTITY: "-"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_NSScreenCaptureUsageDescription: "Slishu читает экран для истории активности и таймлайна, а также (если включено в настройках) записывает системный звук — звонки, встречи, видео — для поиска по разговорам. Всё остаётся на устройстве."
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Slishu записывает и транскрибирует аудио локально, для поиска по разговорам."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Slishu распознаёт речь на устройстве для поиска по аудио."
        INFOPLIST_KEY_LSUIElement: "NO"
        INFOPLIST_KEY_LSMinimumSystemVersion: "15.0"
